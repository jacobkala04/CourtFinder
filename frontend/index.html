<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtFinder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f4f6; color: #222; }

    /* Header */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; letter-spacing: 0.5px; }
    .player-bar { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .player-bar select {
      padding: 5px 10px;
      border-radius: 4px;
      border: none;
      font-size: 14px;
      cursor: pointer;
    }

    /* Nav */
    nav {
      background: #fff;
      border-bottom: 2px solid #e5e7eb;
      display: flex;
      padding: 0 12px;
    }
    nav button {
      padding: 13px 18px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    nav button:hover { color: #1a1a2e; }
    nav button.active { color: #1a1a2e; border-bottom-color: #2563eb; font-weight: bold; }

    /* Layout */
    main { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
    .section { display: none; }
    .section.active { display: block; }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .card h2 { font-size: 17px; margin-bottom: 18px; color: #1a1a2e; }
    .card h3 {
      font-size: 14px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 10px;
      margin-bottom: 16px;
    }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      background: #f9fafb;
      text-align: left;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #777;
      border-bottom: 2px solid #e5e7eb;
    }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
    .sub-text { font-size: 12px; color: #999; margin-top: 2px; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-open, .badge-available, .badge-scheduled { background: #dcfce7; color: #166534; }
    .badge-full, .badge-in-progress                 { background: #fef9c3; color: #854d0e; }
    .badge-closed, .badge-completed, .badge-cancelled { background: #e5e7eb; color: #555; }
    .badge-pending                 { background: #dbeafe; color: #1e40af; }
    .badge-accepted                { background: #dcfce7; color: #166534; }
    .badge-rejected                { background: #fee2e2; color: #991b1b; }

    /* Buttons */
    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-danger  { background: #dc2626; color: #fff; }
    .btn-danger:hover  { background: #b91c1c; }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover { background: #15803d; }
    .btn-muted   { background: #e5e7eb; color: #444; }
    .btn-muted:hover   { background: #d1d5db; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Inline join form */
    .join-form {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 12px;
      margin-top: 8px;
    }
    .join-form textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 8px;
    }

    /* Forms */
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #555; }
    .form-row input,
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
    }
    .form-row textarea { resize: vertical; min-height: 80px; }
    .form-row input:focus,
    .form-row select:focus,
    .form-row textarea:focus { outline: none; border-color: #2563eb; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }

    /* Profile */
    .profile-stat { margin-bottom: 12px; }
    .profile-stat label { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #999; display: block; margin-bottom: 2px; }
    .profile-stat .val { font-size: 15px; }
    .profile-divider { border: none; border-top: 1px solid #e5e7eb; margin: 18px 0; }

    /* Filter bar */
    .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .filter-bar label { font-size: 13px; font-weight: bold; color: #555; }
    .filter-bar select { padding: 6px 10px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; }

    /* Status toast */
    #status {
      position: fixed;
      bottom: 22px;
      right: 22px;
      padding: 13px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      display: none;
      max-width: 380px;
      z-index: 999;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    #status.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    #status.error   { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    .empty { text-align: center; color: #aaa; padding: 30px; font-style: italic; }
  </style>
</head>
<body>

<header>
  <h1>CourtFinder</h1>
  <div class="player-bar">
    Playing as:
    <select id="playerSelect">
      <option value="">-- Select Player --</option>
    </select>
  </div>
</header>

<nav>
  <button data-tab="games"    class="active" onclick="showTab('games')">Find Games</button>
  <button data-tab="courts"   onclick="showTab('courts')">Courts</button>
  <button data-tab="requests" onclick="showTab('requests')">My Requests</button>
  <button data-tab="profile"  onclick="showTab('profile')">My Profile</button>
  <button data-tab="feedback" onclick="showTab('feedback')">Leave Feedback</button>
  <button data-tab="rate"     onclick="showTab('rate')">Rate &amp; Report</button>
</nav>

<main>

  <!-- Find Games -->
  <div id="tab-games" class="section active">
    <div class="card">
      <h2>Find a Game</h2>
      <div class="filter-bar">
        <label>Status:</label>
        <select id="sessionFilter" onchange="renderSessions()">
          <option value="all">All</option>
          <option value="Scheduled">Scheduled</option>
          <option value="In Progress">In Progress</option>
          <option value="Completed">Completed</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>
      <div id="sessionsList"></div>
    </div>
  </div>

  <!-- Courts -->
  <div id="tab-courts" class="section">
    <div class="card">
      <h2>Basketball Courts</h2>
      <div id="courtsList"></div>
    </div>
  </div>

  <!-- My Requests -->
  <div id="tab-requests" class="section">
    <div class="card">
      <h2>My Join Requests</h2>
      <div id="requestsList"></div>
    </div>
  </div>

  <!-- My Profile -->
  <div id="tab-profile" class="section">
    <div class="card">
      <h2>My Profile</h2>
      <div id="profileContent"></div>
    </div>
  </div>

  <!-- Leave Feedback -->
  <div id="tab-feedback" class="section">
    <div class="card">
      <h2>Leave Game Feedback</h2>
      <form id="feedbackForm">
        <div class="form-row">
          <label>Session</label>
          <select id="feedbackSession" required>
            <option value="">-- Select a session --</option>
          </select>
        </div>
        <div class="form-grid-2">
          <div class="form-row">
            <label>Satisfaction Rating (1–5)</label>
            <input type="number" id="feedbackSat" min="1" max="5" placeholder="1–5" required />
          </div>
          <div class="form-row">
            <label>Court Condition (1–5)</label>
            <input type="number" id="feedbackCourt" min="1" max="5" placeholder="1–5" required />
          </div>
        </div>
        <div class="form-row">
          <label>Comments</label>
          <textarea id="feedbackComments" placeholder="How was the game?"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Submit Feedback</button>
      </form>
    </div>
  </div>

  <!-- Rate & Report -->
  <div id="tab-rate" class="section">
    <div class="card">
      <h3>Rate a Player</h3>
      <form id="rateForm">
        <div class="form-grid-2">
          <div class="form-row">
            <label>Player</label>
            <select id="ratePlayer" required>
              <option value="">-- Select player --</option>
            </select>
          </div>
          <div class="form-row">
            <label>Session</label>
            <select id="rateSession" required>
              <option value="">-- Select session --</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>Score (1–10)</label>
          <input type="number" id="rateScore" min="1" max="10" placeholder="1–10" required style="width:140px" />
        </div>
        <div class="form-row">
          <label>Comments</label>
          <textarea id="rateComments" placeholder="How did this player perform?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Submit Rating</button>
      </form>
    </div>

    <div class="card">
      <h3>Report a User</h3>
      <form id="reportForm">
        <div class="form-row">
          <label>User to Report</label>
          <select id="reportUser" required>
            <option value="">-- Select user --</option>
          </select>
        </div>
        <div class="form-row">
          <label>Description</label>
          <textarea id="reportDesc" placeholder="Describe what happened..." required></textarea>
        </div>
        <button type="submit" class="btn btn-danger">Submit Report</button>
      </form>
    </div>
  </div>

</main>

<div id="status"></div>

<script>
  // ── State ───────────────────────────────────────────────────────────────────
  let currentPlayer = null;  // { PlayerID, UserID, Username, SkillLevel, Position, GamesPlayed }
  let players    = [];
  let sessions   = [];       // enriched: includes CourtName, OrganizerName
  let courts     = [];
  let users      = [];
  let moderators = [];

  // ── Init ────────────────────────────────────────────────────────────────────
  async function safeGet(url) {
    try { return await get(url); }
    catch (e) { console.error(`GET ${url} failed:`, e.message); return []; }
  }

  async function init() {
    [players, sessions, courts, users, moderators] = await Promise.all([
      safeGet('/api/browse/players'),
      safeGet('/api/browse/sessions'),
      safeGet('/api/BasketballCourt'),
      safeGet('/api/User'),
      safeGet('/api/Moderator'),
    ]);

    // Player selector
    const pSel = document.getElementById('playerSelect');
    players.forEach(p => pSel.appendChild(makeOption(p.PlayerID, p.Username)));

    // Session dropdowns (feedback + rate tabs)
    ['feedbackSession', 'rateSession'].forEach(id => {
      const sel = document.getElementById(id);
      sessions.forEach(s => {
        const dt = fmtDate(s.DateTime);
        sel.appendChild(makeOption(s.SessionID, `${s.CourtName} — ${s.GameFormat || '?'} (${dt})`));
      });
    });

    // Player dropdown for rating
    const rateSel = document.getElementById('ratePlayer');
    players.forEach(p => rateSel.appendChild(makeOption(p.PlayerID, p.Username)));

    // User dropdown for reporting
    const repSel = document.getElementById('reportUser');
    users.forEach(u => repSel.appendChild(makeOption(u.UserID, u.Username)));

    renderSessions();
    renderCourts();
  }

  // ── Player context ──────────────────────────────────────────────────────────
  document.getElementById('playerSelect').addEventListener('change', e => {
    const id = parseInt(e.target.value);
    currentPlayer = players.find(p => p.PlayerID === id) || null;

    if (isTabActive('requests')) loadRequests();
    if (isTabActive('profile'))  renderProfile();
  });

  // ── Tabs ────────────────────────────────────────────────────────────────────
  function showTab(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${name}`).classList.add('active');
    document.querySelector(`nav button[data-tab="${name}"]`).classList.add('active');

    if (name === 'requests') loadRequests();
    if (name === 'profile')  renderProfile();
  }

  function isTabActive(name) {
    return document.getElementById(`tab-${name}`).classList.contains('active');
  }

  // ── Find Games ──────────────────────────────────────────────────────────────
  function renderSessions() {
    const filter    = document.getElementById('sessionFilter').value;
    const filtered  = filter === 'all' ? sessions : sessions.filter(s => s.Status === filter);
    const container = document.getElementById('sessionsList');

    if (!filtered.length) {
      container.innerHTML = '<div class="empty">No sessions found.</div>';
      return;
    }

    let html = `<table><thead><tr>
      <th>Court</th><th>Date &amp; Time</th><th>Format</th>
      <th>Skill Required</th><th>Capacity</th><th>Status</th><th>Action</th>
    </tr></thead><tbody>`;

    filtered.forEach(s => {
      const statusLow = (s.Status || '').toLowerCase().replace(/\s+/g, '-');
      const canJoin   = s.Status === 'Scheduled';

      html += `<tr>
        <td>
          <strong>${s.CourtName}</strong>
          <div class="sub-text">${s.Location || ''}</div>
        </td>
        <td>${fmtDateTime(s.DateTime)}</td>
        <td>${s.GameFormat  || '—'}</td>
        <td>${s.SkillRequired || '—'}</td>
        <td>${s.Capacity    || '—'}</td>
        <td><span class="badge badge-${statusLow}">${s.Status}</span></td>
        <td>
          ${canJoin
            ? `<button class="btn btn-primary btn-sm"
                       onclick="toggleJoinForm(${s.SessionID})">Request to Join</button>
               <div id="jf-${s.SessionID}" class="join-form" style="display:none">
                 <textarea id="jm-${s.SessionID}"
                           placeholder="Introduce yourself (optional)..."></textarea>
                 <button class="btn btn-success btn-sm"
                         onclick="submitJoin(${s.SessionID}, ${s.OrganizerID})">Send Request</button>
                 <button class="btn btn-muted btn-sm"
                         onclick="toggleJoinForm(${s.SessionID})"
                         style="margin-left:6px">Cancel</button>
               </div>`
            : '—'
          }
        </td>
      </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function toggleJoinForm(sessionId) {
    if (!currentPlayer) {
      showStatus('error', 'Select a player at the top before joining a game.');
      return;
    }
    const el = document.getElementById(`jf-${sessionId}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  async function submitJoin(sessionId, organizerId) {
    if (!currentPlayer) {
      showStatus('error', 'Select a player at the top before joining a game.');
      return;
    }
    const msg = document.getElementById(`jm-${sessionId}`).value;
    const now = new Date().toISOString().slice(0, 19).replace('T', ' ');

    try {
      await post('/api/JoinRequest', {
        PlayerID:    currentPlayer.PlayerID,
        SessionID:   sessionId,
        OrganizerID: organizerId,
        Status:      'Pending',
        Message:     msg,
        Timestamp:   now
      });
      showStatus('success', 'Join request sent successfully!');
      document.getElementById(`jf-${sessionId}`).style.display = 'none';
    } catch (err) {
      showStatus('error', err.message);
    }
  }

  // ── Courts ──────────────────────────────────────────────────────────────────
  function renderCourts() {
    const container = document.getElementById('courtsList');
    if (!courts.length) {
      container.innerHTML = '<div class="empty">No courts found.</div>';
      return;
    }

    let html = `<table><thead><tr>
      <th>Name</th><th>Location</th><th>Facilities</th><th>Availability</th>
    </tr></thead><tbody>`;

    courts.forEach(c => {
      const isAvail = c.AvailStatus == 1;
      const avail   = isAvail ? 'Available' : 'Unavailable';
      const cls     = isAvail ? 'available' : 'closed';
      html += `<tr>
        <td><strong>${c.Name}</strong></td>
        <td>${c.Location   || '—'}</td>
        <td>${c.Facilities || '—'}</td>
        <td><span class="badge badge-${cls}">${avail}</span></td>
      </tr>`;
    });

    html += '</tbody></table>';
    container.innerHTML = html;
  }

  // ── My Requests ─────────────────────────────────────────────────────────────
  async function loadRequests() {
    const container = document.getElementById('requestsList');
    if (!currentPlayer) {
      container.innerHTML = '<div class="empty">Select a player at the top to see your requests.</div>';
      return;
    }

    try {
      const data = await get(`/api/browse/requests/${currentPlayer.PlayerID}`);

      if (!data.length) {
        container.innerHTML = '<div class="empty">No join requests yet.</div>';
        return;
      }

      let html = `<table><thead><tr>
        <th>Session</th><th>Court</th><th>Date</th>
        <th>Status</th><th>Message</th><th>Action</th>
      </tr></thead><tbody>`;

      data.forEach(r => {
        const statusLow = (r.Status || '').toLowerCase();
        html += `<tr>
          <td>${r.GameFormat || '—'}</td>
          <td>${r.CourtName}</td>
          <td>${fmtDate(r.DateTime)}</td>
          <td><span class="badge badge-${statusLow}">${r.Status}</span></td>
          <td>${r.Message || '—'}</td>
          <td>${r.Status === 'Pending'
            ? `<button class="btn btn-danger btn-sm"
                       onclick="cancelRequest(${r.RequestID})">Cancel</button>`
            : '—'
          }</td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = `<div class="empty" style="color:#dc2626">Error: ${err.message}</div>`;
    }
  }

  async function cancelRequest(requestId) {
    if (!confirm('Cancel this join request?')) return;
    try {
      await del('/api/JoinRequest', requestId);
      showStatus('success', 'Join request cancelled.');
      loadRequests();
    } catch (err) {
      showStatus('error', err.message);
    }
  }

  // ── My Profile ───────────────────────────────────────────────────────────────
  function renderProfile() {
    const container = document.getElementById('profileContent');
    if (!currentPlayer) {
      container.innerHTML = '<div class="empty">Select a player at the top to view your profile.</div>';
      return;
    }

    const p = currentPlayer;
    container.innerHTML = `
      <div class="form-grid-2">
        <div class="profile-stat">
          <label>Username</label>
          <div class="val">${p.Username}</div>
        </div>
        <div class="profile-stat">
          <label>Games Played</label>
          <div class="val">${p.GamesPlayed}</div>
        </div>
      </div>
      <hr class="profile-divider" />
      <h3 style="margin-bottom:16px">Update Profile</h3>
      <div class="form-grid-2">
        <div class="form-row">
          <label>Skill Level</label>
          <input type="text" id="profileSkill" value="${p.SkillLevel || ''}" placeholder="e.g. Intermediate" />
        </div>
        <div class="form-row">
          <label>Position</label>
          <input type="text" id="profilePos" value="${p.Position || ''}" placeholder="e.g. Point Guard" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    `;
  }

  async function saveProfile() {
    if (!currentPlayer) return;
    const skillLevel = document.getElementById('profileSkill').value;
    const position   = document.getElementById('profilePos').value;

    try {
      await put('/api/Player', currentPlayer.PlayerID, { SkillLevel: skillLevel, Position: position });

      // Update local state
      currentPlayer.SkillLevel = skillLevel;
      currentPlayer.Position   = position;
      const idx = players.findIndex(p => p.PlayerID === currentPlayer.PlayerID);
      if (idx >= 0) { players[idx].SkillLevel = skillLevel; players[idx].Position = position; }

      showStatus('success', 'Profile updated successfully!');
    } catch (err) {
      showStatus('error', err.message);
    }
  }

  // ── Leave Feedback ───────────────────────────────────────────────────────────
  document.getElementById('feedbackForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!currentPlayer) { showStatus('error', 'Select a player at the top first.'); return; }

    try {
      await post('/api/GameFeedback', {
        PlayerID:            currentPlayer.PlayerID,
        SessionID:           parseInt(document.getElementById('feedbackSession').value),
        SatisfactionRating:  parseInt(document.getElementById('feedbackSat').value),
        CourtConditionRating:parseInt(document.getElementById('feedbackCourt').value),
        Comments:            document.getElementById('feedbackComments').value,
        Timestamp:           new Date().toISOString().slice(0, 19).replace('T', ' ')
      });
      showStatus('success', 'Feedback submitted successfully!');
      document.getElementById('feedbackForm').reset();
    } catch (err) {
      showStatus('error', err.message);
    }
  });

  // ── Rate a Player ────────────────────────────────────────────────────────────
  document.getElementById('rateForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!currentPlayer) { showStatus('error', 'Select a player at the top first.'); return; }

    const ratedPlayerId = parseInt(document.getElementById('ratePlayer').value);
    if (ratedPlayerId === currentPlayer.PlayerID) {
      showStatus('error', "You can't rate yourself.");
      return;
    }

    const ratedPlayer = players.find(p => p.PlayerID === ratedPlayerId);
    if (!ratedPlayer) { showStatus('error', 'Player not found.'); return; }

    try {
      await post('/api/PlayerRating', {
        RaterID:   currentPlayer.PlayerID,
        RatedID:   ratedPlayer.UserID,           // FK → User
        SessionID: parseInt(document.getElementById('rateSession').value),
        Score:     parseInt(document.getElementById('rateScore').value),
        Comments:  document.getElementById('rateComments').value
      });
      showStatus('success', 'Rating submitted successfully!');
      document.getElementById('rateForm').reset();
    } catch (err) {
      showStatus('error', err.message);
    }
  });

  // ── Report a User ────────────────────────────────────────────────────────────
  document.getElementById('reportForm').addEventListener('submit', async e => {
    e.preventDefault();
    if (!currentPlayer) { showStatus('error', 'Select a player at the top first.'); return; }
    if (!moderators.length) { showStatus('error', 'No moderators in the system.'); return; }

    try {
      await post('/api/UserReport', {
        ReporterID:  currentPlayer.PlayerID,
        ReportedID:  parseInt(document.getElementById('reportUser').value),
        ModeratorID: moderators[0].ModeratorID,   // auto-assigned
        Description: document.getElementById('reportDesc').value,
        Status:      'Open',
        Timestamp:   new Date().toISOString().slice(0, 19).replace('T', ' ')
      });
      showStatus('success', 'Report submitted. A moderator will review it.');
      document.getElementById('reportForm').reset();
    } catch (err) {
      showStatus('error', err.message);
    }
  });

  // ── HTTP helpers ─────────────────────────────────────────────────────────────
  async function get(url) {
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  async function post(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Insert failed');
    return data;
  }

  async function put(url, id, body) {
    const res = await fetch(`${url}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Update failed');
    return data;
  }

  async function del(url, id) {
    const res = await fetch(`${url}/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Delete failed');
    return data;
  }

  // ── Status toast ─────────────────────────────────────────────────────────────
  let statusTimer = null;
  function showStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    el.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
    if (statusTimer) clearTimeout(statusTimer);
    statusTimer = setTimeout(() => { el.className = ''; el.textContent = ''; }, 5000);
  }

  // ── Formatters ────────────────────────────────────────────────────────────────
  function fmtDate(val) {
    if (!val) return 'TBD';
    return new Date(val).toLocaleDateString();
  }
  function fmtDateTime(val) {
    if (!val) return 'TBD';
    return new Date(val).toLocaleString();
  }
  function makeOption(value, text) {
    const o = document.createElement('option');
    o.value = value;
    o.textContent = text;
    return o;
  }

  init();
</script>
</body>
</html>
